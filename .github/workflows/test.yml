name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [18.x, 20.x, 22.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
      - run: npm run build
      - run: npm test -- --coverage

      # Test CLI execution
      - name: Test CLI on ${{ matrix.os }} with Node ${{ matrix.node-version }}
        run: |
          node dist/index.js hello --help
          node dist/index.js hello --name "Test User"
          node dist/index.js config set test value
          node dist/index.js config get test
        shell: bash

      # Capture metrics
      - name: Capture build metrics
        if: runner.os == 'Linux' && matrix.node-version == '20.x'
        run: |
          echo "Build Metrics for Node.js oclif" > metrics.txt
          echo "OS: ${{ matrix.os }}" >> metrics.txt
          echo "Node Version: ${{ matrix.node-version }}" >> metrics.txt
          echo "Build completed at: $(date)" >> metrics.txt
          ls -lh dist/index.js >> metrics.txt || echo "No dist/index.js found" >> metrics.txt

      - name: Upload build metrics
        if: runner.os == 'Linux' && matrix.node-version == '20.x'
        uses: actions/upload-artifact@v4
        with:
          name: nodejs-metrics-${{ matrix.os }}
          path: metrics.txt
